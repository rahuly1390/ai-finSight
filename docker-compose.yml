version: "3.9"

services:

  backend:
    build:
      context: ./backend

    container_name: finsight-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

    restart: always


  frontend:
    build:
      context: ./frontend/streamlit

    container_name: finsight-frontend

    ports:
      - "8501:8501"

    environment:
      BACKEND_URL: http://backend:8000/api/v1

    depends_on:
      - backend

    volumes:
      - ./frontend/streamlit:/app

    restart: always